<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<style>
			html,
			body {
				margin: 0;
				padding: 0;
				height: 100%;
				background: #1a1a1a;
			}

			#app-splash {
				position: fixed;
				inset: 0;
				display: flex;
				align-items: center;
				justify-content: center;
				gap: 12px;
				background: #1a1a1a;
				z-index: 9999;
			}
			#app-splash .logo {
				width: 56px;
				height: 56px;
				object-fit: cover;
				border-radius: 9999px;
			}
			#app-splash .loader {
				width: 28px;
				height: 28px;
				border: 3px solid rgba(16, 185, 129, 0.35);
				border-top-color: transparent;
				border-radius: 9999px;
				animation: spin 0.8s linear infinite;
			}
			@keyframes spin {
				to {
					transform: rotate(360deg);
				}
			}
			.fade-out {
				animation: fadeOut 220ms ease forwards;
			}
			@keyframes fadeOut {
				from {
					opacity: 1;
				}
				to {
					opacity: 0;
					visibility: hidden;
				}
			}
		</style>
		<link
			rel="icon"
			type="image/png"
			sizes="32x32"
			href="medyo-system-logo.jpg" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="theme-color" content="#1a1a1a" />
		<title>Medyo System</title>
	</head>
	<body>
		<div id="app-splash" aria-live="polite" aria-busy="true">
			<img class="logo" src="/medyo-system-logo.jpg" alt="Medyo System" />
			<div class="loader" role="status" aria-label="Loading"></div>
		</div>
		<div id="root"></div>
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>
